{% extends 'base.html' %}
{% block title %}Login — 9jaRentPay{% endblock %}
{% block content %}
<div class="min-h-screen bg-gray-100 flex items-center justify-center p-4">
  <div class="w-full max-w-md">
    <!-- Logo -->
    <div class="text-center mb-8">
      <a href="{% url 'landing' %}" class="inline-flex items-center gap-2">
        <div class="w-10 h-10 rounded-xl bg-primary flex items-center justify-center text-white font-bold">9R</div>
        <span class="font-bold text-xl text-gray-900">9jaRentPay</span>
      </a>
    </div>

    <div class="bg-white rounded-2xl shadow-sm p-8">
      <h2 class="text-2xl font-bold text-gray-900 mb-2">Welcome back</h2>
      <p class="text-gray-500 text-sm mb-6">Sign in to your account</p>

      <!-- Role toggle -->
      <div class="flex bg-gray-100 rounded-xl p-1 mb-6" id="role-toggle">
        <button type="button" onclick="setRole('tenant')" id="btn-tenant"
          class="flex-1 py-2 rounded-lg text-sm font-semibold transition bg-primary text-white">
          Tenant
        </button>
        <button type="button" onclick="setRole('landlord')" id="btn-landlord"
          class="flex-1 py-2 rounded-lg text-sm font-semibold transition text-gray-500">
          Landlord
        </button>
      </div>

      <form method="POST">
        {% csrf_token %}
        {% if form.errors %}
          <div class="bg-red-50 text-red-600 text-sm rounded-lg px-4 py-3 mb-4">
            Invalid username or password.
          </div>
        {% endif %}
        <div class="space-y-4">
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Username</label>
            <input type="text" name="username" placeholder="Enter your username"
              class="w-full border border-gray-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-primary/30 focus:border-primary" />
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
            <input type="password" name="password" placeholder="Enter your password"
              class="w-full border border-gray-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-primary/30 focus:border-primary" />
          </div>
        </div>
        <button type="submit"
          class="w-full mt-6 bg-primary hover:bg-primary/90 text-white py-3 rounded-xl font-semibold text-sm transition">
          Sign In
        </button>
      </form>

      <!-- Google OAuth placeholder -->
      <div class="relative my-5">
        <div class="absolute inset-0 flex items-center"><div class="w-full border-t border-gray-200"></div></div>
        <div class="relative flex justify-center text-xs text-gray-400"><span class="bg-white px-3">or</span></div>
      </div>
      <button disabled class="w-full border border-gray-200 py-3 rounded-xl text-sm font-medium text-gray-400 flex items-center justify-center gap-2 cursor-not-allowed">
        <svg class="w-4 h-4" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
        Continue with Google (coming soon)
      </button>

      <p class="text-center text-sm text-gray-500 mt-6">
        Don't have an account? <a href="{% url 'register_step1' %}" class="text-primary font-semibold hover:underline">Register</a>
      </p>
    </div>
  </div>
</div>
<script>
  function setRole(role) {
    const tenant = document.getElementById('btn-tenant');
    const landlord = document.getElementById('btn-landlord');
    if (role === 'tenant') {
      tenant.className = 'flex-1 py-2 rounded-lg text-sm font-semibold transition bg-primary text-white';
      landlord.className = 'flex-1 py-2 rounded-lg text-sm font-semibold transition text-gray-500';
    } else {
      landlord.className = 'flex-1 py-2 rounded-lg text-sm font-semibold transition bg-primary text-white';
      tenant.className = 'flex-1 py-2 rounded-lg text-sm font-semibold transition text-gray-500';
    }
  }
</script>
{% endblock %}
