{% extends 'base.html' %}
{% block title %}Verify Email — 9jaRentPay{% endblock %}
{% block content %}
<div class="min-h-screen bg-gray-100 flex items-center justify-center p-4">
  <div class="w-full max-w-md">
    <div class="text-center mb-8">
      <a href="{% url 'landing' %}" class="inline-flex items-center gap-2">
        <div class="w-10 h-10 rounded-xl bg-primary flex items-center justify-center text-white font-bold">9R</div>
        <span class="font-bold text-xl text-gray-900">9jaRentPay</span>
      </a>
      <div class="flex items-center gap-2 justify-center mt-4">
        <div class="w-8 h-8 rounded-full bg-accent text-white flex items-center justify-center text-sm font-bold">✓</div>
        <div class="w-16 h-1 bg-accent rounded"></div>
        <div class="w-8 h-8 rounded-full bg-primary text-white flex items-center justify-center text-sm font-bold">2</div>
      </div>
    </div>

    <div class="bg-white rounded-2xl shadow-sm p-8">
      <div class="text-center mb-6">
        <div class="w-16 h-16 bg-accent/10 rounded-full flex items-center justify-center mx-auto mb-4 text-3xl">📧</div>
        <h2 class="text-2xl font-bold text-gray-900 mb-2">Check your email</h2>
        <p class="text-gray-500 text-sm">We sent a 6-digit code to <strong>{{ email }}</strong></p>
        <p class="text-xs text-gray-400 mt-1">(Check your terminal/console for the OTP)</p>
      </div>

      {% if error %}
        <div class="bg-red-50 text-red-600 text-sm rounded-lg px-4 py-3 mb-4">{{ error }}</div>
      {% endif %}

      <form method="POST">
        {% csrf_token %}
        <div class="mb-4">
          <label class="block text-sm font-medium text-gray-700 mb-1">Verification Code</label>
          <input type="text" name="otp" maxlength="6" placeholder="123456"
            class="w-full border border-gray-200 rounded-xl px-4 py-3 text-sm text-center text-xl tracking-widest font-bold focus:outline-none focus:ring-2 focus:ring-primary/30 focus:border-primary" />
        </div>

        <div class="mb-4">
          <label class="block text-sm font-medium text-gray-700 mb-1">Phone Number (optional)</label>
          <input type="tel" name="phone" placeholder="08012345678"
            class="w-full border border-gray-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-primary/30 focus:border-primary" />
        </div>

        <div class="mb-6">
          <label class="block text-sm font-medium text-gray-700 mb-1">Address (optional)</label>
          <input type="text" name="address" placeholder="e.g. 14 Admiralty Way, Lekki"
            class="w-full border border-gray-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-primary/30 focus:border-primary" />
        </div>

        <button type="submit"
          class="w-full bg-primary hover:bg-primary/90 text-white py-3 rounded-xl font-semibold text-sm transition">
          Create Account
        </button>
      </form>
    </div>
  </div>
</div>
{% endblock %}
